version: '3.8'
services:
  redis:
    image: redis:7-alpine
    container_name: password-reset-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=123456
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data: